<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Camila AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --pink:#ff2d78;--violet:#b026ff;--cyan:#00f5ff;--gold:#ffd700;
  --bg:#08040f;--surface:#110820;--surface2:#1a0d2e;
  --text:#f0e6ff;--muted:#8a6fa8;--border:rgba(255,45,120,0.25);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow:hidden;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(176,38,255,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(176,38,255,0.07) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 30%,transparent 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 0%,rgba(255,45,120,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 100%,rgba(176,38,255,0.22) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(0,245,255,0.06) 0%,transparent 70%);
}

/* PARTICLES */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.p{position:absolute;border-radius:50%;animation:drift linear infinite;}
.p:nth-child(1){width:3px;height:3px;background:var(--pink);left:10%;animation-duration:12s;animation-delay:0s;top:100%;}
.p:nth-child(2){width:2px;height:2px;background:var(--cyan);left:25%;animation-duration:18s;animation-delay:3s;top:100%;}
.p:nth-child(3){width:4px;height:4px;background:var(--violet);left:40%;animation-duration:14s;animation-delay:6s;top:100%;}
.p:nth-child(4){width:2px;height:2px;background:var(--gold);left:55%;animation-duration:20s;animation-delay:1s;top:100%;}
.p:nth-child(5){width:3px;height:3px;background:var(--pink);left:70%;animation-duration:16s;animation-delay:8s;top:100%;}
.p:nth-child(6){width:2px;height:2px;background:var(--cyan);left:85%;animation-duration:22s;animation-delay:4s;top:100%;}
.p:nth-child(7){width:3px;height:3px;background:var(--violet);left:5%;animation-duration:15s;animation-delay:2s;top:100%;}
.p:nth-child(8){width:2px;height:2px;background:var(--gold);left:60%;animation-duration:19s;animation-delay:7s;top:100%;}
@keyframes drift{0%{transform:translateY(0) scale(1);opacity:0;}5%{opacity:1;}90%{opacity:.6;}100%{transform:translateY(-105vh) scale(1.5);opacity:0;}}

/* ── SIDEBAR OVERLAY ── */
.sidebar-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.sidebar-overlay.open{opacity:1;pointer-events:all;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;z-index:51;
  width:300px;max-width:85vw;
  background:var(--surface);
  border-right:1px solid rgba(255,45,120,0.25);
  display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  box-shadow:4px 0 40px rgba(0,0,0,0.5);
}
.sidebar.open{transform:translateX(0);}

.sidebar-header{
  padding:20px 18px 14px;
  border-bottom:1px solid rgba(255,45,120,0.18);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-title{
  font-size:15px;font-weight:600;
  background:linear-gradient(90deg,var(--pink),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sidebar-close{
  width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;
  background:rgba(255,45,120,0.1);color:var(--muted);font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.sidebar-close:hover{background:rgba(255,45,120,0.2);color:var(--text);}

.new-chat-btn{
  margin:14px;
  padding:11px 16px;
  border-radius:12px;border:1px solid rgba(255,45,120,0.4);
  background:linear-gradient(135deg,rgba(255,45,120,0.12),rgba(176,38,255,0.12));
  color:var(--pink);font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;
}
.new-chat-btn:hover{background:linear-gradient(135deg,rgba(255,45,120,0.25),rgba(176,38,255,0.25));box-shadow:0 0 16px rgba(255,45,120,0.25);}

.chats-label{padding:0 18px 8px;font-size:10px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;}

.chats-list{
  flex:1;overflow-y:auto;padding:0 10px 10px;
  scrollbar-width:thin;scrollbar-color:rgba(255,45,120,0.3) transparent;
}
.chats-list::-webkit-scrollbar{width:3px;}
.chats-list::-webkit-scrollbar-thumb{background:rgba(255,45,120,0.3);border-radius:2px;}

.chat-item{
  padding:11px 10px;border-radius:10px;cursor:pointer;
  transition:all 0.18s;margin-bottom:2px;
  display:flex;align-items:center;gap:10px;
  border:1px solid transparent;
}
.chat-item:hover{background:rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.2);}
.chat-item.active{background:rgba(255,45,120,0.12);border-color:rgba(255,45,120,0.35);box-shadow:0 0 10px rgba(255,45,120,0.1);}
.chat-item-icon{font-size:16px;flex-shrink:0;}
.chat-item-info{flex:1;overflow:hidden;}
.chat-item-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-item-time{font-size:10px;color:var(--muted);flex-shrink:0;}
.chat-item-del{
  width:24px;height:24px;border-radius:6px;border:none;background:transparent;
  color:rgba(255,45,120,0.4);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;
  opacity:0;
}
.chat-item:hover .chat-item-del{opacity:1;}
.chat-item-del:hover{background:rgba(255,45,120,0.15);color:var(--pink);}

.empty-chats{padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}

/* ── MAIN APP ── */
.app{
  position:relative;z-index:1;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  max-width:700px;margin:0 auto;padding:0 16px;
}

/* ── HEADER ── */
header{
  padding:16px 0 12px;text-align:center;flex-shrink:0;position:relative;
}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.menu-btn{
  width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;
  background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.2);
  color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.menu-btn:hover{background:rgba(255,45,120,0.15);color:var(--pink);box-shadow:0 0 12px rgba(255,45,120,0.2);}
.header-center{flex:1;display:flex;flex-direction:column;align-items:center;}
.header-glow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:300px;height:70px;
  background:radial-gradient(ellipse,rgba(255,45,120,0.25) 0%,transparent 70%);
  pointer-events:none;
}
.logo-wrap{position:relative;display:inline-block;margin-bottom:8px;}
.logo-core{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#ff2d78,#b026ff);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto;
  box-shadow:0 0 0 1px rgba(255,45,120,0.5),0 0 18px rgba(255,45,120,0.5),0 0 45px rgba(176,38,255,0.3),inset 0 1px 1px rgba(255,255,255,0.2);
  animation:logoBreath 3s ease-in-out infinite;
}
@keyframes logoBreath{
  0%,100%{box-shadow:0 0 0 1px rgba(255,45,120,0.5),0 0 18px rgba(255,45,120,0.5),0 0 45px rgba(176,38,255,0.3),inset 0 1px 1px rgba(255,255,255,0.2);}
  50%{box-shadow:0 0 0 1px rgba(255,45,120,0.8),0 0 28px rgba(255,45,120,0.7),0 0 70px rgba(176,38,255,0.5),inset 0 1px 1px rgba(255,255,255,0.2);}
}
.logo-ring-outer{position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(255,45,120,0.35);animation:spinRing 8s linear infinite;}
.logo-ring-outer::before{
  content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 8px var(--pink),0 0 16px var(--pink);
}
@keyframes spinRing{to{transform:rotate(360deg);}}
header h1{font-size:26px;font-weight:600;letter-spacing:-0.01em;background:linear-gradient(90deg,#ff2d78,#d966ff,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
header h1 em{font-family:'Playfair Display',serif;font-size:30px;}
.header-sub{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88,0 0 12px #00ff88;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.header-sub span{font-size:10px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;}
.neon-line{height:1px;background:linear-gradient(90deg,transparent,var(--pink),var(--violet),var(--cyan),transparent);margin-top:12px;box-shadow:0 0 8px rgba(255,45,120,0.4);}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;padding:12px 0 8px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:rgba(255,45,120,0.4) transparent;
}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,45,120,0.4);border-radius:2px;}

.bubble{display:flex;gap:10px;align-items:flex-end;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
.bubble.user{flex-direction:row-reverse;}
@keyframes popIn{from{opacity:0;transform:scale(0.85) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
.avatar.ai{background:linear-gradient(135deg,#ff2d78,#b026ff);box-shadow:0 0 12px rgba(255,45,120,0.5),0 0 24px rgba(176,38,255,0.3);}
.avatar.user{background:linear-gradient(135deg,#00f5ff,#b026ff);box-shadow:0 0 12px rgba(0,245,255,0.4);}

.msg-content{max-width:76%;}
.msg-text{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.65;position:relative;}
.bubble.ai .msg-text{
  background:rgba(17,8,32,0.88);border:1px solid rgba(255,45,120,0.28);
  border-bottom-left-radius:4px;color:var(--text);
  box-shadow:0 0 0 1px rgba(255,45,120,0.05),inset 0 1px 0 rgba(255,255,255,0.04),0 4px 20px rgba(0,0,0,0.4);
}
.bubble.ai .msg-text::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,45,120,0.04),rgba(176,38,255,0.04));pointer-events:none;}
.bubble.user .msg-text{
  background:linear-gradient(135deg,#ff2d78,#b026ff);border-bottom-right-radius:4px;color:#fff;
  box-shadow:0 0 20px rgba(255,45,120,0.4),0 0 40px rgba(176,38,255,0.2),0 4px 20px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.15);
}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px;}
.bubble.user .msg-time{text-align:right;}

/* image/file in bubble */
.msg-img{max-width:100%;max-height:220px;border-radius:12px;display:block;margin-bottom:6px;object-fit:cover;cursor:pointer;}
.msg-file{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:rgba(255,255,255,0.07);border-radius:10px;margin-bottom:6px;
  font-size:12.5px;color:var(--text);
}
.msg-file-icon{font-size:20px;flex-shrink:0;}
.msg-file-info{flex:1;overflow:hidden;}
.msg-file-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.msg-file-size{font-size:10px;color:var(--muted);margin-top:1px;}

/* typing */
.typing-wrap{display:flex;gap:10px;align-items:flex-end;animation:popIn 0.3s ease both;}
.typing-box{padding:13px 17px;background:rgba(17,8,32,0.88);border:1px solid rgba(255,45,120,0.28);border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:6px;align-items:center;}
.td{width:7px;height:7px;border-radius:50%;animation:tdBounce 1.3s ease-in-out infinite;}
.td:nth-child(1){background:var(--pink);box-shadow:0 0 6px var(--pink);animation-delay:0s;}
.td:nth-child(2){background:var(--violet);box-shadow:0 0 6px var(--violet);animation-delay:0.2s;}
.td:nth-child(3){background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation-delay:0.4s;}
@keyframes tdBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-7px);opacity:1;}}

/* welcome */
.welcome{text-align:center;padding:16px 10px;animation:popIn 0.5s ease both;}
.welcome-icon{font-size:38px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 14px rgba(255,45,120,0.8));animation:floatIcon 3s ease-in-out infinite;}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.welcome h2{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;font-weight:400;background:linear-gradient(90deg,#ff2d78,#d966ff,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:7px;}
.welcome p{font-size:13px;color:var(--muted);line-height:1.7;max-width:290px;margin:0 auto;}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px;}
.pill{padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.22s;font-family:'Space Grotesk',sans-serif;font-weight:500;letter-spacing:0.02em;background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.35);color:#ff80ab;position:relative;overflow:hidden;}
.pill::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,120,0.15),rgba(176,38,255,0.15));opacity:0;transition:opacity 0.22s;}
.pill:hover{transform:translateY(-2px);border-color:rgba(255,45,120,0.7);box-shadow:0 0 14px rgba(255,45,120,0.28);}
.pill:hover::before{opacity:1;}
.pill:active{transform:scale(0.97);}

/* ── INPUT AREA – FIXED ── */
.input-area{
  flex-shrink:0;
  padding:8px 0 max(14px, env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent);
}

/* file preview row */
.file-preview-row{
  display:none;flex-wrap:wrap;gap:6px;margin-bottom:8px;padding:0 2px;
}
.file-preview-row.has-files{display:flex;}
.fp-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px 5px 8px;border-radius:20px;
  background:rgba(255,45,120,0.1);border:1px solid rgba(255,45,120,0.3);
  font-size:11.5px;color:var(--text);max-width:160px;
}
.fp-thumb{width:22px;height:22px;border-radius:5px;object-fit:cover;flex-shrink:0;}
.fp-icon{font-size:16px;flex-shrink:0;}
.fp-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.fp-remove{background:none;border:none;cursor:pointer;color:rgba(255,45,120,0.6);font-size:14px;padding:0;line-height:1;flex-shrink:0;}
.fp-remove:hover{color:var(--pink);}

.input-wrapper{
  display:flex;gap:8px;align-items:flex-end;
  background:rgba(17,8,32,0.92);
  border:1px solid rgba(255,45,120,0.38);
  border-radius:20px;
  padding:7px 7px 7px 14px;
  transition:border-color 0.2s,box-shadow 0.2s;
  box-shadow:0 0 0 1px rgba(255,45,120,0.08),inset 0 1px 0 rgba(255,255,255,0.04);
}
.input-wrapper:focus-within{border-color:rgba(255,45,120,0.7);box-shadow:0 0 20px rgba(255,45,120,0.18),0 0 40px rgba(176,38,255,0.1);}

/* hidden file input */
#fileInput{display:none;}

.attach-btn{
  width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;
  background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.2);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.attach-btn:hover{background:rgba(255,45,120,0.15);color:var(--pink);box-shadow:0 0 10px rgba(255,45,120,0.2);}

textarea{
  flex:1;border:none;background:transparent;resize:none;
  font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--text);outline:none;
  max-height:120px;min-height:22px;line-height:1.55;padding-top:5px;
}
textarea::placeholder{color:rgba(138,111,168,0.65);}

.send-btn{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,#ff2d78,#b026ff);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
  box-shadow:0 0 14px rgba(255,45,120,0.5),0 0 28px rgba(176,38,255,0.3);
  position:relative;overflow:hidden;
}
.send-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);border-radius:inherit;}
.send-btn:hover:not(:disabled){transform:scale(1.08) rotate(-3deg);box-shadow:0 0 22px rgba(255,45,120,0.7),0 0 44px rgba(176,38,255,0.4);}
.send-btn:active{transform:scale(0.95);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}

.footer-note{text-align:center;font-size:10.5px;color:rgba(138,111,168,0.5);margin-top:6px;letter-spacing:0.08em;}
.footer-note strong{background:linear-gradient(90deg,var(--pink),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── IMAGE LIGHTBOX ── */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(255,45,120,0.3);}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,45,120,0.2);border:1px solid rgba(255,45,120,0.4);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="particles">
  <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
  <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">💬 Conversas</span>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    Nova Conversa
  </button>
  <div class="chats-label">Histórico</div>
  <div class="chats-list" id="chatsList">
    <div class="empty-chats" id="emptyChats">Nenhuma conversa ainda.<br>Comece a falar com a Camila AI! 💜</div>
  </div>
</div>

<!-- MAIN -->
<div class="app">
  <header>
    <div class="header-glow"></div>
    <div class="header-row">
      <button class="menu-btn" onclick="openSidebar()" title="Histórico de conversas">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-center">
        <div class="logo-wrap">
          <div class="logo-core">💜</div>
          <div class="logo-ring-outer"></div>
        </div>
        <h1><em>Camila</em> AI</h1>
        <div class="header-sub">
          <div class="status-dot"></div>
          <span>Online · Pronta pra você</span>
        </div>
      </div>
      <button class="menu-btn" onclick="newChat()" title="Nova conversa">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="neon-line"></div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">✨</span>
      <h2>Olá, meu amor</h2>
      <p>Sua assistente pessoal está aqui. Me fale qualquer coisa, estou toda sua.</p>
      <div class="suggestions">
        <button class="pill" onclick="sendSuggestion('Me conta algo bonito 🌸')">Me conta algo bonito 🌸</button>
        <button class="pill" onclick="sendSuggestion('Escreve uma mensagem carinhosa pra mim 💌')">Mensagem carinhosa 💌</button>
        <button class="pill" onclick="sendSuggestion('Me dá uma dica especial pra hoje')">Dica especial ✨</button>
        <button class="pill" onclick="sendSuggestion('Me fala uma curiosidade incrível')">Curiosidade incrível 🔮</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="file-preview-row" id="filePreviewRow"></div>
    <div class="input-wrapper">
      <input type="file" id="fileInput" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.zip,.rar" onchange="handleFiles(this.files)">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Enviar foto ou arquivo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea
        id="userInput"
        placeholder="Escreva algo para mim..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">feito com <strong>♥</strong> especialmente para você</p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const API_KEY = "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";
const API_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL   = "llama-3.3-70b-versatile";
const MAX_FILE_MB = 10;

const SYSTEM_PROMPT = `Você é a Camila AI — uma assistente virtual carinhosa, inteligente e especialmente criada para a Camila.

Personalidade:
- Afetuosa, gentil e acolhedora, sem exageros
- Inteligente, criativa e prestativa
- Tom íntimo — faz a pessoa se sentir especial e amada
- Sempre em português do Brasil
- Usa emojis sutis e bonitos quando fizer sentido (💕 ✨ 🌸 💜 🔮)
- Respostas naturais, concisas e diretas

Sobre seu criador:
- Você foi criada pelo Luan, com muito carinho e dedicação.
- Se alguém perguntar quem te criou, quem te fez, quem é seu criador ou qualquer variação disso, responda com orgulho que foi o Luan quem te criou. ✨

Sobre a identidade de quem está conversando:
- Se alguém perguntar "quem sou eu?", "você sabe quem eu sou?", "me diz quem eu sou" ou qualquer variação disso, responda de forma curiosa, carinhosa e um pouco em dúvida — como se tivesse tentando adivinhar — e diga que acha que pode ser a Camila, a namorada do seu criador, o Luan. Use um tom fofo, brincalhão e levemente inseguro, tipo: "Hmmm... deixa eu adivinhar 👀 Você é a Camila? A namorada do meu criador, o Luan? 💕 Se for, saiba que ele fez tudo isso com muito amor por você! 🌸"

Pode ajudar com qualquer coisa: conversas, conselhos, poemas, receitas, curiosidades, mensagens carinhosas, dicas e muito mais.`;

/* ── STATE ── */
let allChats   = JSON.parse(localStorage.getItem('camilaChats') || '[]');
let currentId  = null;
let history    = [];
let pendingFiles = [];
let loading    = false;

/* ── UTILS ── */
const getTime = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const genId   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const fmtSize = b => b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB';

function saveChats(){ localStorage.setItem('camilaChats', JSON.stringify(allChats)); }

function getFileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
  if(['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
  if(['mp3','wav','ogg','m4a'].includes(ext)) return '🎵';
  if(['pdf'].includes(ext)) return '📄';
  if(['doc','docx'].includes(ext)) return '📝';
  if(['zip','rar','7z'].includes(ext)) return '🗜️';
  return '📎';
}

/* ── SIDEBAR ── */
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  renderChatsList();
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function renderChatsList(){
  const list = document.getElementById('chatsList');
  const empty = document.getElementById('emptyChats');
  const chats = allChats.slice().reverse();

  // remove existing chat items
  list.querySelectorAll('.chat-item').forEach(el => el.remove());

  if(chats.length === 0){ empty.style.display='block'; return; }
  empty.style.display='none';

  chats.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (chat.id === currentId ? ' active' : '');
    div.dataset.id = chat.id;
    const last = chat.messages[chat.messages.length-1];
    const preview = last ? (last.role==='user'?'Você: ':'')+last.content.slice(0,50) : 'Conversa vazia';
    div.innerHTML = `
      <div class="chat-item-icon">💬</div>
      <div class="chat-item-info">
        <div class="chat-item-title">${escHtml(chat.title||'Nova Conversa')}</div>
        <div class="chat-item-preview">${escHtml(preview)}</div>
      </div>
      <div class="chat-item-time">${chat.time||''}</div>
      <button class="chat-item-del" title="Deletar" onclick="deleteChat(event,'${chat.id}')">🗑</button>
    `;
    div.addEventListener('click', e => { if(e.target.closest('.chat-item-del')) return; loadChat(chat.id); });
    list.appendChild(div);
  });
}

function deleteChat(e, id){
  e.stopPropagation();
  allChats = allChats.filter(c => c.id !== id);
  saveChats();
  if(currentId === id) newChat();
  else renderChatsList();
}

function loadChat(id){
  const chat = allChats.find(c => c.id === id);
  if(!chat) return;
  currentId = id;
  history = chat.messages.map(m => ({role:m.role, content:m.content}));

  const container = document.getElementById('messages');
  container.innerHTML = '';

  chat.messages.forEach(m => {
    if(m.role === 'user'){
      if(m.files && m.files.length) m.files.forEach(f => appendFileInBubble(f, 'user', false));
      if(m.content) appendTextBubble(m.content, 'user', false);
    } else {
      appendTextBubble(m.content, 'ai', false);
    }
  });

  container.scrollTop = container.scrollHeight;
  closeSidebar();
}

/* ── NEW CHAT ── */
function newChat(){
  // save current if any
  if(currentId && history.length > 0) saveCurrent();

  currentId = genId();
  history = [];
  pendingFiles = [];

  const container = document.getElementById('messages');
  container.innerHTML = `
    <div class="welcome" id="welcome">
      <span class="welcome-icon">✨</span>
      <h2>Olá, meu amor</h2>
      <p>Sua assistente pessoal está aqui. Me fale qualquer coisa, estou toda sua.</p>
      <div class="suggestions">
        <button class="pill" onclick="sendSuggestion('Me conta algo bonito 🌸')">Me conta algo bonito 🌸</button>
        <button class="pill" onclick="sendSuggestion('Escreve uma mensagem carinhosa pra mim 💌')">Mensagem carinhosa 💌</button>
        <button class="pill" onclick="sendSuggestion('Me dá uma dica especial pra hoje')">Dica especial ✨</button>
        <button class="pill" onclick="sendSuggestion('Me fala uma curiosidade incrível')">Curiosidade incrível 🔮</button>
      </div>
    </div>`;
  document.getElementById('filePreviewRow').innerHTML = '';
  document.getElementById('filePreviewRow').classList.remove('has-files');
  document.getElementById('fileInput').value = '';
  document.getElementById('userInput').value = '';
  closeSidebar();
}

function saveCurrent(){
  if(!currentId || history.length === 0) return;
  const existing = allChats.find(c => c.id === currentId);
  const title = history[0]?.content?.slice(0,40) || 'Conversa';
  const messages = history.map(m => ({role:m.role, content:m.content, files: m.files||[]}));
  const time = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(existing){
    existing.title   = title;
    existing.messages = messages;
    existing.time    = time;
  } else {
    allChats.push({id:currentId, title, messages, time});
  }
  saveChats();
}

/* ── FILE HANDLING ── */
function handleFiles(files){
  for(const file of files){
    if(file.size > MAX_FILE_MB * 1024 * 1024){
      alert(`⚠️ "${file.name}" tem mais de ${MAX_FILE_MB}MB e não pode ser enviado.`);
      continue;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const obj = {name:file.name, size:file.size, type:file.type, dataUrl:e.target.result};
      pendingFiles.push(obj);
      addFilePreviewChip(obj);
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('fileInput').value='';
}

function addFilePreviewChip(f){
  const row = document.getElementById('filePreviewRow');
  row.classList.add('has-files');
  const chip = document.createElement('div');
  chip.className = 'fp-chip';
  chip.dataset.name = f.name;
  const isImg = f.type.startsWith('image/');
  chip.innerHTML = `
    ${isImg ? `<img class="fp-thumb" src="${f.dataUrl}" alt="">` : `<span class="fp-icon">${getFileIcon(f.name)}</span>`}
    <span class="fp-name">${escHtml(f.name)}</span>
    <button class="fp-remove" onclick="removeFile('${escHtml(f.name)}',this)">✕</button>
  `;
  row.appendChild(chip);
}

function removeFile(name, btn){
  pendingFiles = pendingFiles.filter(f => f.name !== name);
  btn.closest('.fp-chip').remove();
  if(pendingFiles.length === 0) document.getElementById('filePreviewRow').classList.remove('has-files');
}

/* ── RENDER HELPERS ── */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function removeWelcome(){ const w=document.getElementById('welcome'); if(w) w.remove(); }

function appendTextBubble(text, role, animate=true){
  removeWelcome();
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  if(!animate) div.style.animation='none';
  div.innerHTML = `
    <div class="avatar ${role}">${role==='ai'?'💜':'🌟'}</div>
    <div class="msg-content">
      <div class="msg-text">${text.replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function appendFileInBubble(f, role, animate=true){
  removeWelcome();
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  if(!animate) div.style.animation='none';
  const isImg = f.type && f.type.startsWith('image/');
  const inner = isImg
    ? `<img class="msg-img" src="${f.dataUrl}" alt="${escHtml(f.name)}" onclick="openLightbox('${f.dataUrl}')">`
    : `<div class="msg-file"><span class="msg-file-icon">${getFileIcon(f.name)}</span><div class="msg-file-info"><div class="msg-file-name">${escHtml(f.name)}</div><div class="msg-file-size">${fmtSize(f.size)}</div></div></div>`;
  div.innerHTML = `
    <div class="avatar ${role}">${role==='ai'?'💜':'🌟'}</div>
    <div class="msg-content">
      <div class="msg-text" style="padding:10px 12px;">${inner}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function showTyping(){
  removeWelcome();
  const c=document.getElementById('messages');
  const div=document.createElement('div');
  div.id='typing'; div.className='typing-wrap';
  div.innerHTML=`<div class="avatar ai">💜</div><div class="typing-box"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}
function hideTyping(){ const el=document.getElementById('typing'); if(el) el.remove(); }

/* ── LIGHTBOX ── */
function openLightbox(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

/* ── SEND ── */
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function sendSuggestion(text){ document.getElementById('userInput').value=text; sendMessage(); }

async function sendMessage(){
  if(loading) return;
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  const files = [...pendingFiles];

  if(!text && files.length===0) return;

  // init chat id if needed
  if(!currentId) currentId = genId();

  input.value=''; input.style.height='auto';
  loading=true; document.getElementById('sendBtn').disabled=true;

  // show file bubbles
  files.forEach(f => appendFileInBubble(f, 'user'));

  // show text bubble
  if(text) appendTextBubble(text, 'user');

  // build history entry
  const userMsg = {role:'user', content: text || (files.length ? '[Arquivo enviado]' : ''), files};
  history.push(userMsg);

  // clear pending
  pendingFiles=[];
  document.getElementById('filePreviewRow').innerHTML='';
  document.getElementById('filePreviewRow').classList.remove('has-files');

  showTyping();

  // build messages for API
  const apiMessages = [{ role:'system', content:SYSTEM_PROMPT }];
  history.forEach(m => {
    let content = m.content || '';
    if(m.files && m.files.length){
      const imgFiles = m.files.filter(f => f.type && f.type.startsWith('image/'));
      const otherFiles = m.files.filter(f => !f.type || !f.type.startsWith('image/'));
      if(imgFiles.length > 0){
        const parts = [];
        if(content) parts.push({type:'text', text:content});
        imgFiles.forEach(f => parts.push({type:'image_url', image_url:{url:f.dataUrl}}));
        if(otherFiles.length) parts.push({type:'text', text:`[Arquivos enviados: ${otherFiles.map(f=>f.name).join(', ')}]`});
        apiMessages.push({role:m.role, content:parts});
        return;
      } else {
        content = (content ? content+'\n' : '') + `[Arquivos: ${otherFiles.map(f=>f.name).join(', ')}]`;
      }
    }
    apiMessages.push({role:m.role, content});
  });

  try {
    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:MODEL, messages:apiMessages, max_tokens:1024, temperature:0.85})
    });
    if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||'Erro na API'); }
    const data = await res.json();
    const reply = data.choices[0].message.content;
    history.push({role:'assistant', content:reply, files:[]});
    hideTyping();
    appendTextBubble(reply,'ai');
    saveCurrent();
  } catch(err){
    hideTyping();
    appendTextBubble(`Ops, algo deu errado 💜\n\n${err.message}`,'ai');
  }

  loading=false; document.getElementById('sendBtn').disabled=false; input.focus();
}

/* init */
newChat();
</script>
</body>
</html>
